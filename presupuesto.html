<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto APU - COMFER</title>
    <link rel="stylesheet" href="css/comfer.css">
    <style>
        html, body { height: 100%; overflow: hidden; }

        /* Full-screen APU container positioned below nav */
        .apu-shell {
            position: fixed;
            top: 71px;
            left: 0;
            right: 0;
            bottom: 48px;
            display: flex;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        .apu-left {
            width: 348px;
            min-width: 348px;
            display: flex;
            background: #fff;
            border-right: 2px solid #e0e0e0;
            overflow: hidden;
        }

        .apu-phases {
            width: 30px;
            min-width: 30px;
            display: flex;
            flex-direction: column;
        }

        .apu-phase {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 8.5px;
            font-weight: 800;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
        }
        .apu-phase.negra  { background: #3b1a0a; flex: 3; }
        .apu-phase.gris   { background: #2a2a2a; flex: 5; }
        .apu-phase.blanca { background: #0d1f3c; flex: 5; }

        .apu-chapters {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ccc #f5f5f5;
        }
        .apu-chapters::-webkit-scrollbar { width: 4px; }
        .apu-chapters::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

        .apu-chap-header {
            background: #c0392b;
            color: #fff;
            font-size: 10.5px;
            font-weight: 900;
            padding: 9px 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 3;
            display: flex;
            justify-content: space-between;
        }

        .apu-chap-row {
            display: flex;
            align-items: center;
            padding: 7px 10px 7px 12px;
            border-bottom: 1px solid #f0f0f0;
            gap: 7px;
            cursor: pointer;
            transition: background 0.14s;
        }
        .apu-chap-row:hover  { background: #f4f6ff; }
        .apu-chap-row.active { background: #e8efff; border-left: 3px solid #1a4fff; padding-left: 9px; }

        .apu-chap-num  { font-size: 11px; font-weight: 700; color: #999; min-width: 18px; }
        .apu-chap-name { flex: 1; font-size: 11.5px; color: #222; line-height: 1.3; }
        .apu-chap-val  { font-size: 10.5px; font-weight: 700; color: #555; text-align: right; white-space: nowrap; }

        .btn-detalle {
            background: #1a4fff;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 3px 9px;
            font-size: 9.5px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.4px;
            white-space: nowrap;
            transition: background 0.14s;
        }
        .btn-detalle:hover { background: #0033cc; }

        /* ── RIGHT PANEL ── */
        .apu-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f2f2f2;
        }

        /* 3-D building */
        .apu-building {
            flex: 0 0 230px;
            background: #0c1021;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .apu-building-label {
            position: absolute;
            top: 10px; left: 14px;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .apu-chapter-name-overlay {
            position: absolute;
            top: 10px; right: 14px;
            background: rgba(26,79,255,0.75);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        /* APU table area */
        .apu-detail {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            scrollbar-width: thin;
            scrollbar-color: #ccc #f9f9f9;
        }
        .apu-detail::-webkit-scrollbar { width: 6px; }
        .apu-detail::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .apu-detail-bar {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #1a1a2e;
            color: #fff;
            padding: 9px 14px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .apu-cap-badge {
            background: #1a4fff;
            color: #fff;
            font-size: 10px;
            padding: 2px 9px;
            border-radius: 3px;
            font-weight: 800;
        }
        .apu-total-badge {
            margin-left: auto;
            background: rgba(26,79,255,0.25);
            border: 1px solid rgba(26,79,255,0.5);
            color: #a0b8ff;
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 3px;
        }

        .apu-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11.5px;
        }
        .apu-table thead tr { background: #ebebeb; }
        .apu-table th {
            padding: 6px 10px;
            font-size: 9.5px;
            font-weight: 800;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border: 1px solid #ddd;
            white-space: nowrap;
            text-align: center;
        }
        .apu-table th.al { text-align: left; }
        .apu-table td {
            padding: 6px 10px;
            border: 1px solid #eee;
            color: #333;
            vertical-align: middle;
        }
        tr.r-sub  td { background: #eef2ff; font-weight: 700; color: #1a1a2e; }
        tr.r-mat  td { background: #fff; }
        tr.r-mat:hover td { background: #fafbff; }
        tr.r-tot  td { background: #dce8ff; font-weight: 700; color: #0033cc; font-size: 12px; }

        td.ar { text-align: right; }
        td.ac { text-align: center; }
        .col-ref { width: 52px; }
        .col-item { min-width: 140px; }
        .col-sub  { min-width: 180px; }
        .col-und  { width: 68px; }
        .col-qty  { width: 82px; }
        .col-vu   { width: 100px; }
        .col-vt   { width: 110px; font-weight: 600; }

        /* ── STICKY TAB BAR ── */
        .apu-tabs {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 48px;
            background: #12122a;
            border-top: 2px solid #1a4fff;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            z-index: 200;
            scrollbar-width: none;
        }
        .apu-tabs::-webkit-scrollbar { display: none; }

        .apu-tab {
            flex: 0 0 auto;
            height: 48px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.55);
            font-size: 10.5px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            border-right: 1px solid rgba(255,255,255,0.07);
            transition: background 0.14s, color 0.14s;
        }
        .apu-tab:hover  { background: rgba(26,79,255,0.18); color: #fff; }
        .apu-tab.active { background: #1a4fff; color: #fff; font-weight: 800; }
    </style>
</head>

                    {mat:'Mano de obra',                  und:'m²',qty:160,  vu:5500   }
                ]}
              ]
            },
            { id:9,  name:'Techo en drywall',             phase:'blanca',
              items:[
                { ref:'9.1', item:'Cielo raso drywall 1/2"', subs:[
                    {mat:'Placa drywall 1/2"',            und:'m²',qty:75,   vu:22000  },
                    {mat:'Perilería galv.',           und:'m²',qty:75,   vu:14000  },
                    {mat:'Tornillos y masilla',           und:'m²',qty:75,   vu:4500   }
                ]}
              ]
            },
            { id:10, name:'Pisos y enchapes',             phase:'blanca',
              items:[
                { ref:'10.1', item:'Porcelanato 60×60 cm', subs:[
                    {mat:'Porcelanato importado',         und:'m²',qty:55,   vu:85000  },
                    {mat:'Pegante blanco Corona',         und:'bolsa', qty:12,   vu:24900  },
                    {mat:'Boquilla',                      und:'kg',    qty:8,    vu:12000  }
                ]},
                { ref:'10.2', item:'Enchape baño 30×60 cm', subs:[
                    {mat:'Cerámica pared',            und:'m²',qty:28,   vu:42000  },
                    {mat:'Pegante gris',                  und:'bolsa', qty:7,    vu:22000  }
                ]}
              ]
            },
            { id:11, name:'Aparatos hidrosanitarios',     phase:'blanca',
              items:[
                { ref:'11.1', item:'Sanitario One-piece', subs:[
                    {mat:'Sanitario Corona Flux',         und:'und',   qty:2,    vu:420000 },
                    {mat:'Instalación',              und:'und',   qty:2,    vu:65000  }
                ]},
                { ref:'11.2', item:'Lavamanos + grifería', subs:[
                    {mat:'Lavamanos sobreponer',          und:'und',   qty:2,    vu:185000 },
                    {mat:'Grifería monomando',       und:'und',   qty:2,    vu:145000 }
                ]}
              ]
            },
            { id:12, name:'Muebles armario y cocina',     phase:'blanca',
              items:[
                { ref:'12.1', item:'Mueble cocina bajo ml', subs:[
                    {mat:'Mueble bajo melamina',          und:'ml',    qty:3.6,  vu:380000 },
                    {mat:'Mesón cuarzo 2cm',         und:'ml',    qty:3.6,  vu:520000 }
                ]},
                { ref:'12.2', item:'Closet alcoba ml', subs:[
                    {mat:'Closet melamina',               und:'ml',    qty:4.8,  vu:320000 },
                    {mat:'Herrajes corredizos',           und:'und',   qty:4,    vu:45000  }
                ]}
              ]
            },
            { id:13, name:'Aseo y entrega',               phase:'blanca',
              items:[
                { ref:'13.1', item:'Aseo final de obra', subs:[
                    {mat:'Mano de obra aseo',             und:'m²',qty:80,   vu:4000   },
                    {mat:'Materiales limpieza',           und:'gbl',   qty:1,    vu:85000  }
                ]},
                { ref:'13.2', item:'Retiro escombros final', subs:[
                    {mat:'Volqueta',                      und:'viaje', qty:3,    vu:180000 }
                ]}
              ]
            }
        ];

        var active = 2;

        function chapSum(c) {
            return c.items.reduce(function (s, it) {
                return s + it.subs.reduce(function (a, x) { return a + x.qty * x.vu; }, 0);
            }, 0);
        }

        function fmt(n) {
            return '$' + Math.round(n).toLocaleString('es-CO');
        }

        function fmtQty(q) {
            return Number.isInteger(q) ? q.toLocaleString('es-CO') : q.toFixed(2);
        }

        function renderLeft() {
            var html = '';
            CHAPTERS.forEach(function (c) {
                var t = chapSum(c);
                var isActive = c.id === active;
                html += '<div class="apu-chap-row' + (isActive ? ' active' : '') + '" onclick="apuSelect(' + c.id + ')">' +
                    '<span class="apu-chap-num">' + c.id + '</span>' +
                    '<span class="apu-chap-name">' + c.name + '</span>' +
                    '<span class="apu-chap-val">' + fmt(t) + '</span>' +
                    '<button class="btn-detalle" onclick="event.stopPropagation();apuSelect(' + c.id + ')">DETALLE</button>' +
                '</div>';
            });
            document.getElementById('chapList').innerHTML = html;
        }

        function renderTabs() {
            var html = '<div class="apu-tab' + (active === 0 ? ' active' : '') + '" onclick="apuSelect(0)">INICIO</div>';
            CHAPTERS.forEach(function (c) {
                html += '<div class="apu-tab' + (c.id === active ? ' active' : '') + '" onclick="apuSelect(' + c.id + ')">' + c.id + '.&nbsp;' + c.name + '</div>';
            });
            document.getElementById('apuTabs').innerHTML = html;
            var tabs = document.getElementById('apuTabs');
            var act = tabs.querySelector('.apu-tab.active');
            if (act) act.scrollIntoView({ block: 'nearest', inline: 'center' });
        }

        function renderTable(chapId) {
            var c = null;
            for (var i = 0; i < CHAPTERS.length; i++) {
                if (CHAPTERS[i].id === chapId) { c = CHAPTERS[i]; break; }
            }

            var badge = document.getElementById('detBadge');
            var title = document.getElementById('detTitle');
            var total = document.getElementById('detTotal');
            var body  = document.getElementById('apuBody');
            var bname = document.getElementById('buildingChapName');

            if (!c) {
                badge.textContent = 'APU';
                title.textContent = 'Análisis de Precios Unitarios';
                total.textContent = '';
                bname.textContent = 'Resumen General';
                var grand = CHAPTERS.reduce(function (s, ch) { return s + chapSum(ch); }, 0);
                var overview = '';
                CHAPTERS.forEach(function (ch) {
                    var ct = chapSum(ch);
                    var pct = Math.round(ct / grand * 100);
                    overview += '<tr class="r-mat"><td class="col-ref">' + ch.id + '</td>' +
                        '<td class="col-item" colspan="2">' + ch.name + '</td>' +
                        '<td class="ac col-und">' + ch.phase.toUpperCase().replace('negra','ETAPA 1').replace('gris','ETAPA 2').replace('blanca','ETAPA 3') + '</td>' +
                        '<td class="ar col-qty">' + pct + '%</td>' +
                        '<td></td>' +
                        '<td class="ar col-vt">' + fmt(ct) + '</td></tr>';
                });
                overview += '<tr class="r-tot"><td colspan="6" style="text-align:right">TOTAL GENERAL OBRA</td>' +
                    '<td class="ar col-vt">' + fmt(grand) + '</td></tr>';
                body.innerHTML = overview;
                return;
            }

            badge.textContent = 'Cap. ' + c.id;
            title.textContent = c.name;
            bname.textContent = 'Cap. ' + c.id + ' — ' + c.name;
            var ct = chapSum(c);
            total.textContent = 'Total: ' + fmt(ct);

            var html = '';
            c.items.forEach(function (it) {
                var itTotal = it.subs.reduce(function (s, x) { return s + x.qty * x.vu; }, 0);
                html += '<tr class="r-sub">' +
                    '<td class="col-ref"><strong>' + it.ref + '</strong></td>' +
                    '<td class="col-item" colspan="2"><strong>' + it.item + '</strong></td>' +
                    '<td></td><td></td><td></td>' +
                    '<td class="ar col-vt" style="color:#1a4fff;">' + fmt(itTotal) + '</td>' +
                '</tr>';
                it.subs.forEach(function (s) {
                    var vt = s.qty * s.vu;
                    html += '<tr class="r-mat">' +
                        '<td class="col-ref" style="color:#ccc;"></td>' +
                        '<td class="col-item"></td>' +
                        '<td class="col-sub">' + s.mat + '</td>' +
                        '<td class="ac col-und">' + s.und + '</td>' +
                        '<td class="ar col-qty">' + fmtQty(s.qty) + '</td>' +
                        '<td class="ar col-vu">' + fmt(s.vu) + '</td>' +
                        '<td class="ar col-vt">' + fmt(vt) + '</td>' +
                    '</tr>';
                });
            });
            html += '<tr class="r-tot">' +
                '<td colspan="6" style="text-align:right;font-size:11.5px;">TOTAL CAPÍTULO ' + c.id + '</td>' +
                '<td class="ar col-vt">' + fmt(ct) + '</td>' +
            '</tr>';
            body.innerHTML = html;
        }

        window.apuSelect = function (id) {
            active = id;
            renderLeft();
            renderTabs();
            renderTable(id);
        };

        renderLeft();
        renderTabs();
        renderTable(active);
    })();
    </script>
</body>
</html>
